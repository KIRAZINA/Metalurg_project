services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testmetal
      POSTGRES_PASSWORD: testmetal
      POSTGRES_DB: testmetal
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testmetal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    volumes: ["./backend/app:/app/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    command: celery -A app.infrastructure.task_queue worker -l info -c 4
    env_file: ./backend/.env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  beat:
    build: ./backend
    command: celery -A app.infrastructure.task_queue beat -l info
    env_file: ./backend/.env
    depends_on: [redis]

  flower:
    build: ./backend
    command: celery -A app.infrastructure.task_queue flower --port=5555
    ports: ["5555:5555"]
    env_file: ./backend/.env
    depends_on: [redis]

  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [api]

  streamlit:
    build: ./streamlit
    ports: ["8501:8501"]
    environment:
      API_URL: http://api:8000/api/v1
    depends_on: [api]

volumes:
  pgdata:
  minio_data:
