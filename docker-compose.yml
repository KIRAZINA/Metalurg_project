version: '3.8'

services:
  test-metal:
    build: .
    container_name: test-metal-analysis
    volumes:
      - ./source_data.xls:/app/data/source_data.xls:ro
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "main.py", "--file", "data/source_data.xls", "--output", "outputs/"]
    
  test-metal-example:
    build: .
    container_name: test-metal-example
    volumes:
      - ./source_data.xls:/app/source_data.xls:ro
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "examples/example_optimization.py"]
    profiles: ["example"]
